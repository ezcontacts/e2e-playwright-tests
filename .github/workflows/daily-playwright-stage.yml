name: Daily Playwright-BDD Tests

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  tests:
    name: Tests (${{ matrix.project }} - ${{ matrix.env }})
    runs-on: ubuntu-latest
    continue-on-error: true

    strategy:
      matrix:
        env: [stage, preprod]
        project: [desktop, mobile]

    env:
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      ENV: ${{ matrix.env }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npx playwright install --with-deps

      - name: Run tests
        run: npm run ${{ matrix.project }}

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-${{ matrix.project }}-${{ matrix.env }}-${{ github.run_number }}
          path: playwright-report/${{ matrix.project }}
          if-no-files-found: ignore

      - name: Upload JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-json-${{ matrix.project }}-${{ matrix.env }}
          path: reports/${{ matrix.project }}/report.json

      - name: Send Slack report
        if: always()
        run: |
          JSON="reports/${{ matrix.project }}/report.json"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ARTIFACT_URL="$RUN_URL#artifacts"

          if [ ! -f "$JSON" ]; then
            echo "Playwright JSON report not found"
            exit 1
          fi

          PASSED=$(jq '[.. | objects | .results? // empty | .[] | select(.status=="passed")] | length' "$JSON")
          FAILED=$(jq '[.. | objects | .results? // empty | .[] | select(.status=="failed")] | length' "$JSON")
          SKIPPED=$(jq '[.. | objects | .results? // empty | .[] | select(.status=="skipped")] | length' "$JSON")
          TOTAL=$((PASSED + FAILED + SKIPPED))

          MESSAGE="*Playwright BDD — ${{ matrix.project }}*
          *ENV:* $ENV
          *Total:* $TOTAL
          ✅ Passed: $PASSED
          ❌ Failed: $FAILED
          ⏭ Skipped: $SKIPPED

          <$ARTIFACT_URL|📦 Download report>"

          ESCAPED_MESSAGE=$(echo "$MESSAGE" | jq -Rs .)

          curl -s -X POST \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "{\"channel\":\"C0A1W3PEFG9\",\"text\":$ESCAPED_MESSAGE}" \
            https://slack.com/api/chat.postMessage
